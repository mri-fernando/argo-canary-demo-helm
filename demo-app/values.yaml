replicaCount: 2

argocd:
  host: argo-demo.mario.com

app:
  host: demo-app.mario.com

prometheus:
  host: prometheus.mario.com

image:
  repository: roshaneishara/argo-canary-demo-app
  tag: v18
  pullPolicy: Always

service:
  port: 80
  targetPort: 5000

rollout:
  steps:
    - setWeight: 10
    - pause: { duration: 30s }
    - analysis:
        templates:
        - templateName: istio-success-rate
        args:
        - name: service-name
          value: demo-app-canary.demo.svc.cluster.local
        - name: namespace
          value: demo
    - setWeight: 50
    - pause: {duration: 2m}
    - analysis:
        templates:
        - templateName: istio-success-rate
        args:
        - name: service-name
          value: demo-app-canary.demo.svc.cluster.local
        - name: namespace
          value: demo


