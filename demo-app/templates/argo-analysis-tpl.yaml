apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: istio-success-rate
spec:
  args:
  - name: service-name
  - name: namespace

  metrics:
  - name: success-rate
    interval: 30s
    count: 1  # Only query once per analysis run, since we're using a rate() function in the query which already looks at a time window
    successCondition: result[0] >= 0.99 # Consider the analysis successful if the success rate is above 99%
    failureLimit: 2 # Allow up to 2 failures before the analysis is considered failed, since there might be some noise in the metrics

    provider:
      prometheus:
        address: http://prometheus-kube-prometheus-prometheus.monitoring:9090
        query: |
          sum(rate(istio_requests_total{
            reporter="destination",
            destination_service=~"{{`{{args.service-name}}`}}",
            destination_workload_namespace="{{`{{args.namespace}}`}}",
            response_code!~"5.*"
          }[2m])) 
          /
          sum(rate(istio_requests_total{
            reporter="destination",
            destination_service=~"{{`{{args.service-name}}`}}",
            destination_workload_namespace="{{`{{args.namespace}}`}}"
          }[2m]))