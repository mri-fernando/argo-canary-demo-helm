apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-istio
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - demo
  selector:
    matchLabels:
      app: demo-app
  endpoints:
    - port: http-envoy-prom
      path: /stats/prometheus
      interval: 15s